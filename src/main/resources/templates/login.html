<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Login - AR-8</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
    <h1>AR-8</h1>
    <p class="subtitle">Always Ready</p>

    <form id="loginForm">
        <div class="form-group">
            <label for="email">E-mailadres</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label for="password">Wachtwoord</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit">Inloggen</button>
    </form>

    <p class="link-text">
        Nog geen account? <a href="/register-page">Registreren</a>
    </p>

    <p class="link-text">
        <a href="/wachtwoord-vergeten">Wachtwoord vergeten?</a>
    </p>

    <p class="message" id="message"></p>
</div>

<script>
    const form = document.getElementById('loginForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async function(event) {
        event.preventDefault();

        const submitBtn = form.querySelector('button[type="submit"]');

        submitBtn.disabled = true;
        submitBtn.textContent = 'Bezig met inloggen...';

        const loginData = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        const response = await fetch('/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(loginData)
        });

        if (response.ok) {
            submitBtn.textContent = 'Ingelogd!';
            const data = await response.json();
            localStorage.setItem('token', data.token);
            window.location.href = '/home';
        } else {
            message.style.color = '#ef4444';
            message.textContent = 'Inloggen mislukt. Controleer je gegevens.';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Inloggen';
        }
    });
</script>
</body>
</html>
