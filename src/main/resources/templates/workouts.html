<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Workout - AR-8</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="trainingplan-page secured">
<div class="container dashboard-container">

    <div class="welcome-box">
        <a href="/home" class="btn-home">
            ← Terug naar hoofdmenu
        </a>
        <h1 id="pageTitle">Workout</h1>
        <p class="subtitle" id="pageSubtitle">Laadt...</p>
    </div>

    <div class="week-nav">
        <button class="cal-nav" id="prevWeek">‹</button>
        <div class="week-days" id="weekDays"></div>
        <button class="cal-nav" id="nextWeek">›</button>
    </div>

    <div id="workoutContent"></div>

</div>

<script th:inline="none">
    // ─── State ───────────────────────────────────────
    const token = localStorage.getItem('token');
    const urlParams  = new URLSearchParams(window.location.search);
    const urlDate    = urlParams.get('date');
    let selectedDate = urlDate ? new Date(urlDate + 'T00:00:00') : new Date();
    selectedDate.setHours(0, 0, 0, 0);
    let weekOffset    = 0;
    let currentScores = {};
    let filledDates   = [];
    let userPRs       = {};

    // ─── Auth ─────────────────────────────────────────
    async function checkAuth() {
        if (!token) {
            window.location.href = '/';
            return false;
        }
        try {
            const response = await fetch('/auth/me', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!response.ok) {
                localStorage.removeItem('token');
                window.location.href = '/';
                return false;
            }
            document.body.classList.add('auth-ready');
            return true;
        } catch (error) {
            window.location.href = '/';
            return false;
        }
    }

    // ─── Helpers ─────────────────────────────────────
    function toDateStr(date) {
        return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    }

    function getMondayOfWeek(date, offset) {
        const d = new Date(date);
        const day = d.getDay();
        const diff = (day === 0 ? -6 : 1 - day) + (offset * 7);
        d.setDate(d.getDate() + diff);
        d.setHours(0, 0, 0, 0);
        return d;
    }

    function formatDate(dateStr) {
        const d = new Date(dateStr + 'T00:00:00');
        const dagen   = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
        const maanden = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
        return `${dagen[d.getDay()]} ${d.getDate()} ${maanden[d.getMonth()]} ${d.getFullYear()}`;
    }

    const dagNamen   = ['Ma', 'Di', 'Wo', 'Do', 'Vr', 'Za', 'Zo'];
    const maandNamen = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];

    // ─── PR's laden ───────────────────────────────────
    async function loadPRs() {
        try {
            const response = await fetch('/api/pr', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (response.ok) {
                userPRs = await response.json();
            }
        } catch (e) {
            console.error('PR laden mislukt:', e);
        }
    }

    // ─── Gevulde datums laden ─────────────────────────
    async function loadFilledDates() {
        try {
            const response = await fetch('/api/trainingsplan/datums', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (response.ok) {
                filledDates = await response.json();
            }
        } catch (e) {
            console.error('Datums laden mislukt:', e);
        }
    }

    // ─── Percentage berekening ────────────────────────
    function processPercentages(text, prExercise) {
        if (!prExercise || prExercise === 'vrij') {
            return text.replace(
                /\[([^\]]+)\]\s*([^\n]*?)@\s*(\d+(?:\.\d+)?)%/gi,
                (match, exercise, rest, percentage) => {
                    const key = exercise.toLowerCase().trim().replace(/\s+/g, '');
                    const pr  = userPRs[key];
                    if (!pr) return match;
                    const weight = Math.round(pr * (parseFloat(percentage) / 100));
                    return `${rest}@ ${weight}kg`;
                }
            );
        }

        const pr = userPRs[prExercise];
        if (!pr) return text;

        return text.replace(
            /@\s*([\d]+(?:\.\d+)?(?:-[\d]+(?:\.\d+)?)*)%/g,
            (match, percentagePart) => {
                const weights = percentagePart.split('-').map(p => {
                    return Math.round(pr * (parseFloat(p) / 100));
                });
                return `@ ${weights.join('-')}kg`;
            }
        );
    }

    // ─── Weekbalk ─────────────────────────────────────
    function renderWeekBar() {
        const container = document.getElementById('weekDays');
        container.innerHTML = '';

        const monday = getMondayOfWeek(selectedDate, weekOffset);
        const today  = toDateStr(new Date());
        const selStr = toDateStr(selectedDate);

        for (let i = 0; i < 7; i++) {
            const d = new Date(monday);
            d.setDate(monday.getDate() + i);
            const dateStr  = toDateStr(d);
            const isFilled = filledDates.includes(dateStr);

            const cell = document.createElement('div');
            cell.classList.add('week-day-cell');
            if (dateStr === today)  cell.classList.add('week-today');
            if (dateStr === selStr) cell.classList.add('week-selected');

            cell.innerHTML = `
                <span class="week-day-name">${dagNamen[i]}</span>
                <span class="week-day-num">${d.getDate()}</span>
                <span class="week-day-month">${maandNamen[d.getMonth()]}</span>
                ${isFilled ? '<span class="week-dot"></span>' : ''}
            `;

            cell.addEventListener('click', () => {
                selectedDate = new Date(d);
                renderWeekBar();
                loadWorkout(toDateStr(selectedDate));
            });

            container.appendChild(cell);
        }
    }

    // ─── Workout laden ────────────────────────────────
    async function loadWorkout(dateStr) {
        const content  = document.getElementById('workoutContent');
        const subtitle = document.getElementById('pageSubtitle');
        content.innerHTML = '<p style="color:#94a3b8">Laden...</p>';

        try {
            const [planRes, scoreRes] = await Promise.all([
                fetch(`/api/trainingsplan/${dateStr}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                }),
                fetch(`/api/scores/${dateStr}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                })
            ]);

            currentScores = scoreRes.ok ? await scoreRes.json() : {};

            if (!planRes.ok) {
                subtitle.textContent = formatDate(dateStr);
                content.innerHTML = `
                    <div class="no-workout">
                        <p>Geen workout gepland voor deze dag.</p>
                    </div>
                `;
                return;
            }

            const plan = await planRes.json();
            subtitle.textContent = formatDate(dateStr);
            renderWorkout(plan, dateStr);

        } catch (e) {
            content.innerHTML = '<p style="color:#ef4444">Fout bij laden.</p>';
        }
    }

    // ─── Workout renderen ─────────────────────────────
    function renderWorkout(plan, dateStr) {
        const content = document.getElementById('workoutContent');
        content.innerHTML = '';

        if (plan.warmup) {
            content.appendChild(createViewBlock('Warming Up', plan.warmup, null, null, dateStr, null));
        }

        (plan.blocks || []).forEach((block, index) => {
            const blockKey = `block_${index}_${(block.prExercise && block.prExercise !== 'vrij') ? block.prExercise : block.title.toLowerCase().replace(/\s+/g, '_')}`;
            content.appendChild(createViewBlock(block.title, block.content, block.scoreType, blockKey, dateStr, block.prExercise));
        });

        if (plan.cooling) {
            content.appendChild(createViewBlock('Accessory', plan.cooling, null, null, dateStr, null));
        }
    }

    // ─── Blok aanmaken ───────────────────────────────
    function createViewBlock(title, content, scoreType, blockKey, dateStr, prExercise) {
        const div = document.createElement('div');
        div.classList.add('workout-view-block');

        const existingScore    = blockKey ? (currentScores[blockKey] || '') : '';
        const processedContent = processPercentages(content || '', prExercise);
        let scoreHtml = '';

        if (scoreType && scoreType !== 'geen') {
            if (scoreType === 'tijd') {
                const parts = existingScore.split(':');
                const min   = parts[0] || '';
                const sec   = parts[1] || '';
                scoreHtml = `
                    <div class="score-input-row">
                        <span class="score-label">Jouw tijd:</span>
                        <div class="time-inputs">
                            <input type="number" class="score-time-input" id="min-${blockKey}"
                                   placeholder="00" min="0" max="99" value="${min}">
                            <span class="time-sep">:</span>
                            <input type="number" class="score-time-input" id="sec-${blockKey}"
                                   placeholder="00" min="0" max="59" value="${sec}">
                            <span class="score-unit">min : sec</span>
                        </div>
                        <button class="btn-score-save" onclick="saveScore('${dateStr}', '${blockKey}', 'tijd', '${blockKey}')">
                            ${existingScore ? 'Aanpassen' : 'Opslaan'}
                        </button>
                        <a class="btn-leaderboard" href="/leaderboard?date=${dateStr}&blockKey=${blockKey}&scoreType=tijd">
                            🏆 Leaderboard
                        </a>
                    </div>
                `;
            } else {
                const unit = scoreType === 'kg' ? 'kg' : scoreType === 'rondes' ? 'rondes' : 'reps';
                scoreHtml = `
                    <div class="score-input-row">
                        <span class="score-label">Jouw score:</span>
                        <input type="number" class="score-number-input" id="val-${blockKey}"
                               placeholder="0" value="${existingScore}">
                        <span class="score-unit">${unit}</span>
                        <button class="btn-score-save" onclick="saveScore('${dateStr}', '${blockKey}', '${scoreType}', '${blockKey}', '${prExercise || ''}')">
                            ${existingScore ? 'Aanpassen' : 'Opslaan'}
                        </button>
                        <a class="btn-leaderboard" href="/leaderboard?date=${dateStr}&blockKey=${blockKey}&scoreType=${scoreType}">
                            🏆 Leaderboard
                        </a>
                    </div>
                `;
            }
        }

        div.innerHTML = `
            <div class="view-block-header">
                <h2>${title}</h2>
                ${scoreType && scoreType !== 'geen' ? `<span class="score-type-badge">${scoreType}</span>` : ''}
            </div>
            <pre class="workout-text">${processedContent}</pre>
            ${scoreHtml}
        `;

        return div;
    }

    // ─── Score opslaan ────────────────────────────────
    async function saveScore(dateStr, blockKey, scoreType, inputId, prExercise) {
        let scoreValue = '';

        if (scoreType === 'tijd') {
            const min = document.getElementById(`min-${inputId}`).value.padStart(2, '0');
            const sec = document.getElementById(`sec-${inputId}`).value.padStart(2, '0');
            scoreValue = `${min}:${sec}`;
        } else {
            scoreValue = document.getElementById(`val-${inputId}`).value;
        }

        if (!scoreValue || scoreValue === '00:00') return;

        try {
            const response = await fetch('/api/scores', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ date: dateStr, blockKey, scoreValue })
            });

            if (response.ok) {
                currentScores[blockKey] = scoreValue;
                const btn = document.querySelector(`[onclick*="${blockKey}"]`);
                if (btn) btn.textContent = 'Aanpassen';

                if (scoreType === 'kg' && prExercise && prExercise !== 'vrij' && prExercise !== '') {
                    await checkAndUpdatePR(prExercise, parseFloat(scoreValue));
                }
            }
        } catch (e) {
            console.error('Score opslaan mislukt:', e);
        }
    }

    // ─── PR check en update ───────────────────────────
    async function checkAndUpdatePR(exercise, weight) {
        try {
            const response = await fetch('/api/pr', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ exercise, weight })
            });

            if (response.ok) {
                const result = await response.json();
                if (result.isNewPR) {
                    showConfetti();
                    showPRBanner(exercise, weight);
                    userPRs[exercise] = weight;
                }
            }
        } catch (e) {
            console.error('PR check mislukt:', e);
        }
    }

    // ─── Confetti ─────────────────────────────────────
    function showConfetti() {
        const colors = ['#22c55e', '#f59e0b', '#3b82f6', '#ef4444', '#a855f7'];

        for (let i = 0; i < 80; i++) {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti-piece');
            confetti.style.left              = Math.random() * 100 + 'vw';
            confetti.style.background        = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.animationDelay    = Math.random() * 2 + 's';
            confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 4000);
        }
    }

    function showPRBanner(exercise, weight) {
        const banner = document.createElement('div');
        banner.classList.add('pr-banner');
        banner.innerHTML = `🎉 Nieuwe PR! ${exercise}: ${weight}kg`;
        document.body.appendChild(banner);
        setTimeout(() => banner.remove(), 4000);
    }

    // ─── Init ─────────────────────────────────────────
    document.getElementById('prevWeek').addEventListener('click', () => {
        weekOffset--;
        renderWeekBar();
    });

    document.getElementById('nextWeek').addEventListener('click', () => {
        weekOffset++;
        renderWeekBar();
    });

    checkAuth().then(ok => {
        if (ok) {
            Promise.all([loadFilledDates(), loadPRs()]).then(() => {
                renderWeekBar();
                loadWorkout(toDateStr(selectedDate));
            });
        }
    });
</script>
</body>
</html>
