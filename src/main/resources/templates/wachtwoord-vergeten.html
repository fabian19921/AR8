<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Wachtwoord vergeten - AR-8</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
    <h1>Wachtwoord vergeten</h1>
    <p class="subtitle">Vul je emailadres in en je ontvangt een reset link.</p>

    <form id="forgotForm">
        <div class="form-group">
            <label for="email">E-mailadres</label>
            <input type="email" id="email" required placeholder="Jouw emailadres">
        </div>

        <button type="submit" id="submitBtn">Reset link versturen</button>
    </form>

    <p class="link-text">
        <a href="/">Terug naar inloggen</a>
    </p>

    <p class="message" id="message"></p>
</div>

<script>
    document.getElementById('forgotForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const message   = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const email     = document.getElementById('email').value;

        submitBtn.disabled = true;
        submitBtn.textContent = 'Bezig met versturen...';

        try {
            const response = await fetch('/api/password/forgot', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const text = await response.text();

            submitBtn.style.display = 'none';
            message.style.color = '#22c55e';
            message.textContent = text;

        } catch (e) {
            message.style.color = '#ef4444';
            message.textContent = 'Verbinding fout.';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Reset link versturen';
        }
    });
</script>
</body>
</html>
