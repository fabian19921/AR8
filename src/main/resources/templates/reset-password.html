<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Nieuw wachtwoord - AR-8</title>
    <link rel="stylesheet" href="/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="container">
    <h1>Nieuw wachtwoord</h1>
    <p class="subtitle" id="subtitle">Kies een nieuw wachtwoord.</p>

    <div id="formContainer">
        <div class="form-group">
            <label for="password">Nieuw wachtwoord</label>
            <input type="password" id="password" placeholder="Minimaal 6 tekens">
        </div>

        <div class="form-group">
            <label for="confirm">Bevestig wachtwoord</label>
            <input type="password" id="confirm" placeholder="Herhaal wachtwoord">
        </div>

        <button id="resetBtn">Wachtwoord instellen</button>
    </div>

    <p class="message" id="message"></p>

    <p class="link-text">
        <a href="/">Terug naar inloggen</a>
    </p>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');
    const message = document.getElementById('message');

    // Valideer token bij laden
    async function validateToken() {
        if (!token) {
            document.getElementById('formContainer').style.display = 'none';
            message.style.color = '#ef4444';
            message.textContent = 'Ongeldige link.';
            return;
        }

        try {
            const response = await fetch(`/api/password/validate?token=${token}`);
            if (!response.ok) {
                const text = await response.text();
                document.getElementById('formContainer').style.display = 'none';
                message.style.color = '#ef4444';
                message.textContent = text;
            }
        } catch (e) {
            message.style.color = '#ef4444';
            message.textContent = 'Verbinding fout.';
        }
    }

    document.getElementById('resetBtn').addEventListener('click', async () => {
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('confirm').value;

        try {
            const response = await fetch('/api/password/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password, confirm })
            });

            const text = await response.text();

            if (response.ok) {
                message.style.color = '#22c55e';
                message.textContent = 'Wachtwoord gewijzigd! Je kunt nu inloggen.';
                document.getElementById('formContainer').style.display = 'none';
            } else {
                message.style.color = '#ef4444';
                message.textContent = text;
            }
        } catch (e) {
            message.style.color = '#ef4444';
            message.textContent = 'Verbinding fout.';
        }
    });

    validateToken();
</script>
</body>
</html>
